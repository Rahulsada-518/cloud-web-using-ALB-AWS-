<!DOCTYPE html>
<html>
<head>
  <title>Student Registration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f3;
      padding: 40px;
    }
    .container {
      width: 450px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 15px #aaa;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    label {
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Student Registration Form</h1>

    <form>
      <label>Full Name</label>
      <input type="text" placeholder="Enter student name" required>

      <label>Email</label>
      <input type="email" placeholder="Enter email" required>

      <label>Mobile Number</label>
      <input type="tel" placeholder="Enter mobile number" required>

      <label>Gender</label>
      <select required>
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <label>Course</label>
      <select required>
        <option value="">Select Course</option>
        <option>B.Tech CSE</option>
        <option>B.Sc Data Science</option>
        <option>MCA</option>
        <option>MBA</option>
      </select>

      <label>Address</label>
      <textarea placeholder="Enter address"></textarea>

      <button type="submit">Register Student</button>
    </form>
  </div>

</body>
</html>
